<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get MatchCoach</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--pink:#E84393;--coral:#FF6B6B;--dark:#1A1A2E;--warm:#FFFAF5}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:linear-gradient(160deg,#1A1A2E,#3a1030);color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px}
.ic{width:72px;height:72px;background:linear-gradient(135deg,#E84393,#FD79A8);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:38px;margin-bottom:20px}
h1{font-size:28px;font-weight:700;margin-bottom:8px}
p{opacity:.8;font-size:15px;margin-bottom:28px;max-width:320px}
.btn{display:flex;align-items:center;justify-content:center;gap:10px;width:280px;max-width:85vw;padding:16px;border-radius:60px;text-decoration:none;font-weight:700;font-size:16px;margin-bottom:14px}
.ios{background:#fff;color:#1A1A2E}
.and{background:#2bb673;color:#fff}
.note{opacity:.55;font-size:13px;margin-top:10px}
</style>
</head>
<body>
    <div class="ic">&#x26A1;</div>
    <h1>Get MatchCoach</h1>
    <p>The AI wingman that reads a dating-app screenshot and writes your perfect reply in seconds.</p>
    <a class="btn ios" id="ios" href="https://apps.apple.com/app/matchcoach-ai-dating-rizz/id6773615477">&#x1F34E; Download on iOS</a>
    <a class="btn and" id="and" href="https://play.google.com/store/apps/details?id=com.matchcoach.app">&#x1F4F1; Get it on Android</a>
    <div class="note" id="note">Redirecting you to your app store&hellip;</div>

<script>
(function(){
  // Preserve any campaign tags (?utm_source=creator etc.) onto the store links.
  var qs = window.location.search || "";
  var ios = document.getElementById('ios');
  var and = document.getElementById('and');
  // Append utm params to Play link as a referrer so Play Console attributes the install.
  try {
    var params = new URLSearchParams(qs);
    var src = params.get('utm_source') || '';
    var camp = params.get('utm_campaign') || '';
    if (src || camp) {
      var ref = encodeURIComponent('utm_source=' + (src||'creator') + '&utm_campaign=' + (camp||'story'));
      and.href = and.href + '&referrer=' + ref;
    }
  } catch(e){}

  var ua = navigator.userAgent || navigator.vendor || "";
  var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
  var isAndroid = /android/i.test(ua);

  // Auto-redirect to the right store after a brief moment (so the page paints first).
  if (isIOS)      { document.getElementById('note').textContent = "Opening the App Store\u2026"; setTimeout(function(){ window.location.href = ios.href; }, 800); }
  else if (isAndroid) { document.getElementById('note').textContent = "Opening Google Play\u2026"; setTimeout(function(){ window.location.href = and.href; }, 800); }
  else            { document.getElementById('note').textContent = "Choose your platform above."; }
})();
</script>
</body>
</html>
